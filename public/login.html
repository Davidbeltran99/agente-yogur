<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tellolac AI | Acceso premium</title>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.remove('theme-light', 'theme-dark');
        document.documentElement.classList.add(`theme-${theme}`);
      } catch (_error) {
        document.documentElement.classList.add('theme-light');
      }
    })();
  </script>
  <link rel="icon" type="image/jpeg" href="/assets/logo-tellolac.jpg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <svg width="0" height="0" class="icon-sprite" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="icon-bot" viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 3v4M9 12h.01M15 12h.01M8.5 16h7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
      <symbol id="icon-circle-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24"><path d="m12 3 1.9 4.6L18.5 9l-4.6 1.4L12 15l-1.9-4.6L5.5 9l4.6-1.4Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 3v4M3 5h4M19 17v4M17 19h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    </defs>
  </svg>

  <main class="auth-shell premium-login-shell">
    <div class="auth-video-layer" aria-hidden="true">
      <video class="auth-background-video" autoplay muted loop playsinline preload="metadata">
        <source src="/assets/video/login-background.mp4" type="video/mp4" />
      </video>
      <div class="auth-video-overlay"></div>
    </div>

    <section class="auth-card premium-auth-card">
      <div class="auth-brand">
        <img src="/assets/logo-tellolac.jpg" alt="Logo Tellolac" class="auth-logo" />
        <div>
          <p class="eyebrow">Tellolac AI</p>
          <h1>Acceso premium</h1>
          <p class="subtitle">Ingresa al panel comercial premium de Tellolac.</p>
        </div>
      </div>

      <div class="auth-copy-box">
        <div class="auth-copy-row">
          <span class="status-pill status-online"><svg class="ui-icon" aria-hidden="true"><use href="#icon-circle-dot"></use></svg>Abi assistant online</span>
          <span class="glass-tag"><svg class="ui-icon" aria-hidden="true"><use href="#icon-sparkles"></use></svg>Powered by Abi</span>
        </div>
        <p>Pedidos, historial y conversaciones en una sola vista.</p>
        <div class="auth-highlight">
          <svg class="ui-icon" aria-hidden="true"><use href="#icon-bot"></use></svg>
          <span>Operación comercial ágil, clara y lista para demo.</span>
        </div>
      </div>

      <form id="loginForm">
        <label>
          <span>Usuario</span>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="Ingresa tu usuario" required />
        </label>
        <label>
          <span>Contraseña</span>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Ingresa tu contraseña" required />
        </label>
        <p id="loginError" class="auth-error"></p>
        <button type="submit" class="primary">Ingresar al panel</button>
      </form>

      <p class="auth-note">Tellolac AI · Powered by Abi · Solo personal autorizado.</p>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorNode = document.getElementById('loginError');
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/';

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorNode.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const submitButton = form.querySelector('button[type="submit"]');
      submitButton.disabled = true;

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          const remaining = Number.isInteger(payload.remainingAttempts)
            ? ` Intentos restantes: ${payload.remainingAttempts}.`
            : '';
          const retry = payload.retryAfterSeconds
            ? ` Intenta de nuevo en ${payload.retryAfterSeconds}s.`
            : '';
          throw new Error((payload.error || 'No se pudo iniciar sesión') + remaining + retry);
        }

        window.location.href = next.startsWith('/') ? next : '/';
      } catch (error) {
        errorNode.textContent = error.message;
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
