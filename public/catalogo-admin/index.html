<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tellolac | Admin catálogo web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fff8ec',
              500: '#f59e0b',
              600: '#d97706',
              900: '#78350f'
            }
          },
          boxShadow: {
            soft: '0 20px 50px rgba(15, 23, 42, 0.12)'
          }
        }
      }
    };
  </script>
  <link rel="icon" type="image/jpeg" href="/assets/logo-tellolac.jpg" />
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="mx-auto min-h-screen max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <header class="mb-6 flex flex-col gap-4 rounded-3xl bg-white p-6 shadow-soft lg:flex-row lg:items-center lg:justify-between">
      <div class="flex items-center gap-4">
        <img src="/assets/logo-tellolac.jpg" alt="Tellolac" class="h-14 w-14 rounded-2xl object-cover" />
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-600">Panel catálogo web</p>
          <h1 class="text-2xl font-black">Gestión del catálogo Tellolac</h1>
          <p class="text-sm text-slate-500">Administra productos, precios, imágenes, categorías y visibilidad sin tocar Abi.</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-3">
        <a href="/" class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Volver al panel</a>
        <a href="/catalogo" target="_blank" rel="noopener" class="rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Abrir catálogo público</a>
      </div>
    </header>

    <div class="grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
      <section class="rounded-3xl bg-white p-5 shadow-soft">
        <div class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <h2 class="text-lg font-bold">Productos del catálogo</h2>
            <p id="adminMeta" class="text-sm text-slate-500">Cargando productos...</p>
          </div>
          <div class="flex gap-3">
            <input id="adminSearchInput" type="search" placeholder="Buscar producto..." class="rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            <button id="newProductButton" class="rounded-2xl bg-brand-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-brand-600">Nuevo producto</button>
          </div>
        </div>
        <div id="adminFeedback" class="mb-4 hidden rounded-2xl px-4 py-3 text-sm"></div>
        <div id="productList" class="grid gap-4"></div>
      </section>

      <section class="rounded-3xl bg-white p-5 shadow-soft">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-600">Editor</p>
            <h2 id="formTitle" class="text-lg font-bold">Nuevo producto</h2>
          </div>
          <button id="resetFormButton" class="rounded-2xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Limpiar</button>
        </div>

        <form id="productForm" class="space-y-4">
          <input id="productIdInput" type="hidden" />
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-medium text-slate-700">
              Nombre
              <input id="productNameInput" type="text" required class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
            <label class="block text-sm font-medium text-slate-700">
              Categoría
              <input id="productCategoryInput" type="text" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
          </div>
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-medium text-slate-700">
              Precio público
              <input id="productPublicPriceInput" type="number" min="0" step="100" required class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
            <label class="block text-sm font-medium text-slate-700">
              Precio distribuidor
              <input id="productDistributorPriceInput" type="number" min="0" step="100" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
          </div>
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-medium text-slate-700">
              Presentación
              <input id="productPresentationInput" type="text" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
            <label class="block text-sm font-medium text-slate-700">
              Stock
              <input id="productStockInput" type="number" min="0" step="1" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
          </div>
          <label class="block text-sm font-medium text-slate-700">
            Descripción
            <textarea id="productDescriptionInput" rows="3" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none"></textarea>
          </label>
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-medium text-slate-700">
              Imagen (URL)
              <input id="productImageUrlInput" type="text" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
            <label class="block text-sm font-medium text-slate-700">
              Subir imagen
              <input id="productImageFileInput" type="file" accept="image/*" class="mt-1 block w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" />
            </label>
          </div>
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-medium text-slate-700">
              Orden
              <input id="productOrderInput" type="number" min="0" step="1" value="0" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
            <label class="block text-sm font-medium text-slate-700">
              Aliases (separados por coma)
              <input id="productAliasesInput" type="text" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-brand-400 focus:outline-none" />
            </label>
          </div>
          <div class="grid gap-3 md:grid-cols-2">
            <label class="flex items-center gap-3 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-700"><input id="productVisiblePublicInput" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-brand-500 focus:ring-brand-400" /> Visible en Público</label>
            <label class="flex items-center gap-3 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-700"><input id="productVisibleDistributorInput" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-brand-500 focus:ring-brand-400" /> Visible en Distribuidor</label>
            <label class="flex items-center gap-3 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-700"><input id="productWebActiveInput" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-brand-500 focus:ring-brand-400" /> Activo en catálogo web</label>
            <label class="flex items-center gap-3 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-700"><input id="productActiveInput" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-brand-500 focus:ring-brand-400" /> Activo en sistema</label>
          </div>
          <button id="saveProductButton" type="submit" class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Guardar producto</button>
        </form>
      </section>
    </div>
  </div>

  <script src="/catalogo-admin.js"></script>
</body>
</html>
